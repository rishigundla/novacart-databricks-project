<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" width="1800" height="1100" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
