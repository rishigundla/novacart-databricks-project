  <line x1="480" y1="280" x2="520" y2="280" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <g>
    <rect x="1260" y="240" width="180" height="100" rx="14" ry="14" fill="url(#biGrad)" stroke="#0F172A" stroke-width="1.4"/>
    <text x="1350" y="278" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">BI Dashboards</text>
    <text x="1350" y="300" text-anchor="middle" font-size="11" fill="#EDE9FE">Databricks SQL</text>
    <text x="1350" y="318" text-anchor="middle" font-size="11" fill="#EDE9FE">Consumption Layer</text>
  </g>

  <line x1="1220" y1="290" x2="1260" y2="290" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

