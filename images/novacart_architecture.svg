  <rect x="0" y="0" width="1480" height="1080" fill="#F8FAFC"/>

  <text x="740" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#0F172A">NovaCart Data Engineering Architecture on Databricks</text>
  <text x="740" y="64" text-anchor="middle" font-size="14" fill="#475569">Lakehouse Federation, Medallion Architecture, Delta Lake, SCD2 History, and Workflow Orchestration</text>

  <g>
    <rect x="40" y="120" width="240" height="320" rx="16" ry="16" fill="url(#azureGrad)" stroke="#0F172A" stroke-width="1.5"/>
    <text x="160" y="152" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Azure SQL Database</text>
    <text x="160" y="174" text-anchor="middle" font-size="12" fill="#E0F2FE">Source System (OLTP)</text>

    <rect x="62" y="200" width="196" height="62" rx="8" ry="8" fill="#FFFFFF" stroke="#0F172A" stroke-width="1"/>
    <text x="160" y="226" text-anchor="middle" font-size="13" font-weight="600" fill="#0F172A">Customer Orders</text>
    <text x="160" y="246" text-anchor="middle" font-size="11" fill="#475569">orders.updated_at, order_id</text>

    <rect x="62" y="276" width="196" height="62" rx="8" ry="8" fill="#FFFFFF" stroke="#0F172A" stroke-width="1"/>
    <text x="160" y="302" text-anchor="middle" font-size="13" font-weight="600" fill="#0F172A">Product Details</text>
    <text x="160" y="322" text-anchor="middle" font-size="11" fill="#475569">products.updated_at, product_id</text>

    <rect x="62" y="352" width="196" height="62" rx="8" ry="8" fill="#FFFFFF" stroke="#0F172A" stroke-width="1"/>
    <text x="160" y="378" text-anchor="middle" font-size="13" font-weight="600" fill="#0F172A">Payment Transactions</text>
    <text x="160" y="398" text-anchor="middle" font-size="11" fill="#475569">payments.processed_at, payment_id</text>
  </g>

  <g>
    <rect x="320" y="240" width="160" height="80" rx="12" ry="12" fill="#FFFFFF" stroke="#0078D4" stroke-width="2"/>
    <text x="400" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#0F172A">Databricks</text>
    <text x="400" y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#0078D4">Lakehouse Federation</text>
    <text x="400" y="308" text-anchor="middle" font-size="11" fill="#475569">Ingestion Connector</text>
  </g>

  <line x1="280" y1="280" x2="320" y2="280" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <g>
    <rect x="520" y="120" width="700" height="420" rx="18" ry="18" fill="#FFFFFF" stroke="url(#dbxGrad)" stroke-width="3"/>
    <rect x="520" y="120" width="700" height="44" rx="18" ry="18" fill="url(#dbxGrad)"/>
    <text x="540" y="150" font-size="16" font-weight="700" fill="#FFFFFF">Azure Databricks</text>
    <text x="540" y="164" font-size="11" fill="#FFE8E2">Processing Platform</text>

    <g>
      <rect x="1050" y="130" width="150" height="28" rx="14" ry="14" fill="#0F172A"/>
      <circle cx="1068" cy="144" r="9" fill="#FFFFFF"/>
      <text x="1090" y="149" font-size="12" font-weight="600" fill="#FFFFFF">GitHub Version Control</text>
    </g>

    <g>
      <rect x="540" y="190" width="660" height="330" rx="14" ry="14" fill="url(#ucGrad)" stroke="#D97706" stroke-width="1.6"/>
      <text x="870" y="218" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">Unity Catalog</text>
      <text x="870" y="234" text-anchor="middle" font-size="11" fill="#9A3412">dbw_data_prj</text>

      <g>
        <rect x="560" y="250" width="620" height="252" rx="12" ry="12" fill="url(#repoGrad)" stroke="#1D4ED8" stroke-width="1.4"/>
        <text x="870" y="276" text-anchor="middle" font-size="13" font-weight="700" fill="#1E3A8A">Databricks Repos</text>

        <g>
          <rect x="580" y="296" width="180" height="190" rx="12" ry="12" fill="url(#bronzeGrad)" stroke="#0F172A" stroke-width="1.2"/>
          <text x="670" y="322" text-anchor="middle" font-size="14" font-weight="700" fill="#0F172A">Bronze</text>
          <text x="670" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#0F172A">Incremental Data Loading</text>
          <line x1="600" y1="354" x2="740" y2="354" stroke="#0F172A" stroke-opacity="0.35"/>
          <text x="670" y="372" text-anchor="middle" font-size="10.5" fill="#0F172A">orders_raw</text>
          <text x="670" y="388" text-anchor="middle" font-size="10.5" fill="#0F172A">products_raw</text>
          <text x="670" y="404" text-anchor="middle" font-size="10.5" fill="#0F172A">payments_raw</text>
          <text x="670" y="424" text-anchor="middle" font-size="10.5" font-style="italic" fill="#0F172A">ingestion_control</text>
          <text x="670" y="448" text-anchor="middle" font-size="10" fill="#0F172A">Watermark of</text>
          <text x="670" y="462" text-anchor="middle" font-size="10" fill="#0F172A">timestamp + primary key</text>
        </g>

        <g>
          <rect x="780" y="296" width="180" height="190" rx="12" ry="12" fill="url(#silverGrad)" stroke="#0F172A" stroke-width="1.2"/>
          <text x="870" y="322" text-anchor="middle" font-size="14" font-weight="700" fill="#0F172A">Silver</text>
          <text x="870" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#0F172A">Cleaning and Transformations</text>
          <line x1="800" y1="354" x2="940" y2="354" stroke="#0F172A" stroke-opacity="0.35"/>
          <text x="870" y="372" text-anchor="middle" font-size="10.5" fill="#0F172A">orders_cleaned, _transformed</text>
          <text x="870" y="388" text-anchor="middle" font-size="10.5" fill="#0F172A">products_cleaned, _transformed</text>
          <text x="870" y="404" text-anchor="middle" font-size="10.5" fill="#0F172A">payments_cleaned, _transformed</text>
          <text x="870" y="424" text-anchor="middle" font-size="10.5" font-style="italic" fill="#B91C1C">orders / products / payments</text>
          <text x="870" y="438" text-anchor="middle" font-size="10.5" font-style="italic" fill="#B91C1C">_quarantine</text>
          <text x="870" y="462" text-anchor="middle" font-size="10" fill="#0F172A">processing_control</text>
        </g>

        <g>
          <rect x="980" y="296" width="180" height="190" rx="12" ry="12" fill="url(#goldGrad)" stroke="#0F172A" stroke-width="1.2"/>
          <text x="1070" y="322" text-anchor="middle" font-size="14" font-weight="700" fill="#0F172A">Gold</text>
          <text x="1070" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#0F172A">Joining, Enrichment, SCD2,</text>
          <text x="1070" y="356" text-anchor="middle" font-size="11" font-weight="600" fill="#0F172A">Business Aggregations</text>
          <line x1="1000" y1="368" x2="1140" y2="368" stroke="#0F172A" stroke-opacity="0.35"/>
          <text x="1070" y="386" text-anchor="middle" font-size="10.5" fill="#0F172A">orders_information</text>
          <text x="1070" y="402" text-anchor="middle" font-size="10.5" fill="#0F172A">orders_information_scd2</text>
          <text x="1070" y="418" text-anchor="middle" font-size="10.5" fill="#0F172A">category_performance</text>
          <text x="1070" y="438" text-anchor="middle" font-size="10" fill="#0F172A">Snapshots on Volume:</text>
          <text x="1070" y="452" text-anchor="middle" font-size="10" fill="#0F172A">latest + timestamped runs</text>
          <text x="1070" y="472" text-anchor="middle" font-size="10" fill="#0F172A">processing_control</text>
        </g>

