          <text x="1555" y="674" text-anchor="middle" font-size="10" fill="#0F172A">gold_snapshots/run_date / run_ts</text>
          <line x1="1430" y1="690" x2="1680" y2="690" stroke="#0F172A" stroke-opacity="0.4"/>
