    <text x="730" y="694" text-anchor="middle" font-size="12" fill="#ECFDF5">Sequential Notebook Execution then Dashboard Refresh then Alert Evaluation</text>
  </g>

  <line x1="730" y1="540" x2="730" y2="640" stroke="#334155" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="746" y="600" font-size="12" font-style="italic" fill="#475569">orchestrates</text>

  <g>
    <rect x="220" y="780" width="240" height="90" rx="14" ry="14" fill="#FFFFFF" stroke="#059669" stroke-width="1.6"/>
    <text x="340" y="812" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">Notebook Files</text>
    <text x="340" y="832" text-anchor="middle" font-size="11" fill="#0F172A">novacart_bronze</text>
    <text x="340" y="848" text-anchor="middle" font-size="11" fill="#0F172A">novacart_silver</text>
    <text x="340" y="864" text-anchor="middle" font-size="11" fill="#0F172A">novacart_gold</text>
  </g>

  <g>
    <rect x="560" y="780" width="240" height="90" rx="14" ry="14" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.6"/>
    <text x="680" y="812" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">BI Dashboard Refresh</text>
    <text x="680" y="834" text-anchor="middle" font-size="11" fill="#0F172A">Auto refresh of Gold tables</text>
    <text x="680" y="852" text-anchor="middle" font-size="11" fill="#0F172A">in Databricks SQL Dashboards</text>
  </g>

  <g>
    <rect x="900" y="780" width="240" height="90" rx="14" ry="14" fill="url(#alertGrad)" stroke="#0F172A" stroke-width="1.4"/>
    <text x="1020" y="812" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Alert</text>
    <text x="1020" y="834" text-anchor="middle" font-size="11" fill="#FEF2F2">Quality and failure</text>
    <text x="1020" y="852" text-anchor="middle" font-size="11" fill="#FEF2F2">conditions evaluated</text>
  </g>

  <line x1="340" y1="720" x2="340" y2="780" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="680" y1="720" x2="680" y2="780" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1020" y1="720" x2="1020" y2="780" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <polygon points="1020,920 1110,970 1020,1020 930,970" fill="#FEF3C7" stroke="#92400E" stroke-width="1.8"/>
    <text x="1020" y="966" text-anchor="middle" font-size="12" font-weight="700" fill="#0F172A">Trigger?</text>
    <text x="1020" y="982" text-anchor="middle" font-size="11" fill="#475569">Condition met</text>
  </g>

  <line x1="1020" y1="870" x2="1020" y2="920" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="1180" y="940" width="220" height="70" rx="14" ry="14" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.8"/>
    <text x="1290" y="970" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">Trigger Notification</text>
    <text x="1290" y="990" text-anchor="middle" font-size="11" fill="#0F172A">Email or webhook to on call</text>
  </g>

  <line x1="1110" y1="970" x2="1180" y2="970" stroke="#16A34A" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <text x="1140" y="962" font-size="12" font-weight="700" fill="#16A34A">Yes</text>

  <g>
    <rect x="800" y="940" width="100" height="60" rx="14" ry="14" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="850" y="975" text-anchor="middle" font-size="12" font-weight="600" fill="#7F1D1D">No action</text>
  </g>

  <line x1="930" y1="970" x2="900" y2="970" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="903" y="962" text-anchor="end" font-size="12" font-weight="700" fill="#DC2626">No</text>

  <line x1="1160" y1="392" x2="1260" y2="290" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <g font-size="11" fill="#334155">
    <rect x="40" y="980" width="280" height="80" rx="10" ry="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
    <text x="56" y="1004" font-weight="700" fill="#0F172A">Legend</text>
    <rect x="56" y="1014" width="14" height="14" fill="url(#bronzeGrad)" stroke="#0F172A"/>
    <text x="78" y="1026">Bronze</text>
    <rect x="130" y="1014" width="14" height="14" fill="url(#silverGrad)" stroke="#0F172A"/>
    <text x="152" y="1026">Silver</text>
    <rect x="200" y="1014" width="14" height="14" fill="url(#goldGrad)" stroke="#0F172A"/>
    <text x="222" y="1026">Gold</text>
    <line x1="56" y1="1046" x2="86" y2="1046" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="92" y="1050">Data flow</text>
    <line x1="170" y1="1046" x2="200" y2="1046" stroke="#334155" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
    <text x="206" y="1050">Control flow</text>
  </g>
</svg>
